<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SwitchBot Gateway Debug</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0d1115;
        --panel: #151b21;
        --panel-2: #1b232b;
        --line: #303a44;
        --text: #eef3f6;
        --muted: #9ca9b3;
        --good: #45b985;
        --warn: #e5b75f;
        --bad: #ef6f78;
        --blue: #66a6ff;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
      }

      main {
        height: 100vh;
        display: grid;
        grid-template-rows: auto auto minmax(0, 1fr);
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 16px 20px;
        border-bottom: 1px solid var(--line);
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
      }

      h1 {
        font-size: 20px;
        font-weight: 680;
      }

      button,
      input,
      textarea {
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #10161b;
        color: var(--text);
        font: inherit;
      }

      button {
        min-height: 38px;
        padding: 0 12px;
        cursor: pointer;
      }

      button:hover {
        background: #202a33;
      }

      button.active {
        border-color: var(--warn);
        color: var(--warn);
      }

      input,
      textarea {
        min-height: 38px;
        padding: 8px 10px;
      }

      textarea {
        min-height: 38px;
        max-height: 140px;
        resize: vertical;
      }

      label {
        display: grid;
        gap: 5px;
        color: var(--muted);
        font-size: 12px;
      }

      .connection {
        display: grid;
        grid-template-columns: minmax(260px, 1.2fr) minmax(220px, 1fr) minmax(180px, 0.8fr) auto auto;
        gap: 10px;
        align-items: end;
        padding: 14px 20px;
        border-bottom: 1px solid var(--line);
        background: var(--panel);
      }

      .status {
        display: flex;
        align-items: center;
        gap: 8px;
        color: var(--muted);
        font-size: 13px;
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--bad);
      }

      .connected .dot,
      .online .dot {
        background: var(--good);
      }

      .layout {
        min-height: 0;
        display: grid;
        grid-template-columns: minmax(380px, 0.9fr) minmax(520px, 1.1fr);
      }

      .sidebar {
        min-height: 0;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        border-right: 1px solid var(--line);
        background: #10151a;
      }

      .overview {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        border-bottom: 1px solid var(--line);
      }

      .metric {
        padding: 12px 14px;
        border-right: 1px solid var(--line);
      }

      .metric:last-child {
        border-right: 0;
      }

      .metric strong {
        display: block;
        font-size: 18px;
      }

      .metric span {
        color: var(--muted);
        font-size: 12px;
      }

      .devices {
        overflow: auto;
        padding: 10px;
      }

      .device {
        width: 100%;
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 10px;
        padding: 12px;
        margin-bottom: 8px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        text-align: left;
      }

      .device:hover,
      .device.selected {
        background: var(--panel-2);
        border-color: #4b5965;
      }

      .device-title {
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
      }

      .device-name {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-weight: 650;
      }

      .device-sub {
        margin-top: 5px;
        color: var(--muted);
        font-size: 12px;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 3px 8px;
        color: var(--muted);
        font-size: 12px;
        white-space: nowrap;
      }

      .pill.online {
        border-color: #2f7658;
        color: #91eac0;
      }

      .pill.offline {
        border-color: #7c3c42;
        color: #f0a2a8;
      }

      .detail {
        min-height: 0;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto;
      }

      .gateway {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 10px;
        padding: 14px 16px;
        border-bottom: 1px solid var(--line);
        background: var(--panel);
      }

      .gateway h2 {
        font-size: 16px;
      }

      .gateway p,
      .detail-meta {
        color: var(--muted);
        font-size: 12px;
        margin-top: 4px;
      }

      .detail-body {
        min-height: 0;
        overflow: auto;
        padding: 16px;
      }

      .section {
        margin-bottom: 18px;
      }

      .section h3 {
        margin-bottom: 8px;
        font-size: 13px;
        color: var(--muted);
        font-weight: 620;
        text-transform: uppercase;
      }

      .facts {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 8px;
      }

      .fact {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        padding: 10px;
      }

      .fact span {
        display: block;
        color: var(--muted);
        font-size: 12px;
        margin-bottom: 4px;
      }

      .fact strong {
        display: block;
        overflow-wrap: anywhere;
        font-size: 15px;
      }

      pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 13px;
        line-height: 1.5;
      }

      .json {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #0a0e12;
        padding: 12px;
      }

      .publish {
        display: grid;
        grid-template-columns: minmax(220px, 1fr) minmax(260px, 1.4fr) auto;
        gap: 10px;
        align-items: end;
        padding: 12px 16px;
        border-top: 1px solid var(--line);
        background: var(--panel);
      }

      .empty {
        color: var(--muted);
        padding: 24px;
      }

      @media (max-width: 980px) {
        main {
          height: auto;
          min-height: 100vh;
        }

        .connection,
        .layout,
        .publish {
          grid-template-columns: 1fr;
        }

        .sidebar {
          border-right: 0;
          border-bottom: 1px solid var(--line);
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>SwitchBot Gateway Debug</h1>
        <div id="connection-status" class="status">
          <span class="dot"></span><span>disconnected</span>
        </div>
      </header>

      <section class="connection">
        <label>
          WebSocket URL
          <input id="url" value="ws://localhost:9001" />
        </label>
        <label>
          Subscribe
          <input id="topic" value="switchbot/#" />
        </label>
        <label>
          Filter Devices
          <input id="filter" placeholder="name, id, type..." />
        </label>
        <button id="connect">Reconnect</button>
        <button id="pause">Pause</button>
      </section>

      <section class="layout">
        <aside class="sidebar">
          <div class="overview">
            <div class="metric"><strong id="device-count">0</strong><span>devices</span></div>
            <div class="metric"><strong id="online-count">0</strong><span>online</span></div>
            <div class="metric"><strong id="message-count">0</strong><span>messages</span></div>
            <div class="metric"><strong id="rate">0/s</strong><span>rate</span></div>
          </div>
          <div id="devices" class="devices">
            <div class="empty">Waiting for gateway inventory.</div>
          </div>
        </aside>

        <section class="detail">
          <div class="gateway">
            <div>
              <h2 id="gateway-title">Gateway</h2>
              <p id="gateway-meta">No status received.</p>
            </div>
            <div id="gateway-pill" class="pill offline"><span class="dot"></span><span>offline</span></div>
          </div>

          <div class="detail-body">
            <div id="empty-detail" class="empty">Select a device to inspect its current state.</div>
            <div id="device-detail" hidden>
              <div class="section">
                <h3>Device</h3>
                <div id="identity" class="facts"></div>
              </div>

              <div class="section">
                <h3>Current State</h3>
                <div id="state-facts" class="facts"></div>
              </div>

              <div class="section">
                <h3>Latest Payload</h3>
                <pre id="raw-state" class="json"></pre>
              </div>

              <div class="section">
                <h3>Info Payload</h3>
                <pre id="raw-info" class="json"></pre>
              </div>
            </div>
          </div>

          <div class="publish">
            <label>
              Publish Topic
              <input id="publish-topic" value="switchbot/gateway/commands/reload" />
            </label>
            <label>
              Payload
              <textarea id="publish-payload">{"request_id":"debug-reload"}</textarea>
            </label>
            <button id="publish">Publish</button>
          </div>
        </section>
      </section>
    </main>

    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script>
      const els = {
        connectionStatus: document.getElementById("connection-status"),
        url: document.getElementById("url"),
        topic: document.getElementById("topic"),
        filter: document.getElementById("filter"),
        pause: document.getElementById("pause"),
        devices: document.getElementById("devices"),
        deviceCount: document.getElementById("device-count"),
        onlineCount: document.getElementById("online-count"),
        messageCount: document.getElementById("message-count"),
        rate: document.getElementById("rate"),
        gatewayTitle: document.getElementById("gateway-title"),
        gatewayMeta: document.getElementById("gateway-meta"),
        gatewayPill: document.getElementById("gateway-pill"),
        emptyDetail: document.getElementById("empty-detail"),
        deviceDetail: document.getElementById("device-detail"),
        identity: document.getElementById("identity"),
        stateFacts: document.getElementById("state-facts"),
        rawState: document.getElementById("raw-state"),
        rawInfo: document.getElementById("raw-info"),
        publishTopic: document.getElementById("publish-topic"),
        publishPayload: document.getElementById("publish-payload"),
      };

      const devices = new Map();
      const gateway = { status: "offline", info: null, inventory: null, updatedAt: null };
      let client;
      let selectedId = "";
      let paused = false;
      let messageCount = 0;
      let lastRateCount = 0;
      let nextDeviceSequence = 0;

      function setConnectionStatus(text, connected = false) {
        els.connectionStatus.lastElementChild.textContent = text;
        els.connectionStatus.classList.toggle("connected", connected);
      }

      function timeLabel(date) {
        if (!date) return "never";
        return date.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" });
      }

      function parsePayload(payload) {
        const text = new TextDecoder().decode(payload);
        try {
          return { value: JSON.parse(text), text: JSON.stringify(JSON.parse(text), null, 2) };
        } catch {
          return { value: text, text };
        }
      }

      function deviceOf(id) {
        if (!devices.has(id)) {
          devices.set(id, {
            id,
            sequence: nextDeviceSequence++,
            info: null,
            state: null,
            availability: "unknown",
            lastSeen: null,
            stateUpdatedAt: null,
            infoUpdatedAt: null,
            messages: 0,
          });
        }
        return devices.get(id);
      }

      function formatValue(value) {
        if (value === null || value === undefined || value === "") return "unknown";
        if (typeof value === "number") return Number.isInteger(value) ? String(value) : value.toFixed(2);
        if (typeof value === "boolean") return value ? "yes" : "no";
        return String(value);
      }

      function fact(label, value) {
        const item = document.createElement("div");
        item.className = "fact";
        item.innerHTML = "<span></span><strong></strong>";
        item.firstElementChild.textContent = label;
        item.lastElementChild.textContent = formatValue(value);
        return item;
      }

      function deviceName(device) {
        return device.info?.name || device.info?.raw?.deviceName || device.id;
      }

      function deviceType(device) {
        return device.info?.type || device.info?.raw?.deviceType || "unknown";
      }

      function latestState(device) {
        const state = device.state || {};
        return state.pyswitchbot && typeof state.pyswitchbot === "object" ? state.pyswitchbot : state;
      }

      function visibleDevices() {
        const filter = els.filter.value.trim().toLowerCase();
        return [...devices.values()]
          .filter((device) => {
            if (!filter) return true;
            return [device.id, deviceName(device), deviceType(device), device.availability]
              .join(" ")
              .toLowerCase()
              .includes(filter);
          })
          .sort((a, b) => a.sequence - b.sequence);
      }

      function renderOverview() {
        const all = [...devices.values()];
        els.deviceCount.textContent = all.length;
        els.onlineCount.textContent = all.filter((device) => device.availability === "online").length;
        els.messageCount.textContent = messageCount;
      }

      function renderGateway() {
        const online = gateway.status === "online";
        els.gatewayTitle.textContent = `Gateway ${gateway.status || "unknown"}`;
        const total = gateway.inventory?.devices_total ?? devices.size;
        els.gatewayMeta.textContent = `devices: ${total} · updated: ${timeLabel(gateway.updatedAt)}`;
        els.gatewayPill.className = `pill ${online ? "online" : "offline"}`;
        els.gatewayPill.lastElementChild.textContent = gateway.status || "unknown";
      }

      function renderDevices() {
        const list = visibleDevices();
        if (list.length === 0) {
          els.devices.innerHTML = '<div class="empty">No matching devices.</div>';
          renderOverview();
          return;
        }
        els.devices.textContent = "";
        for (const device of list) {
          const state = latestState(device);
          const temp = state.temperature ?? state.temperature_c ?? state.temp;
          const humidity = state.humidity ?? state.humidity_percent;
          const battery = state.battery ?? state.battery_percent;
          const row = document.createElement("button");
          row.className = `device${device.id === selectedId ? " selected" : ""}`;
          row.innerHTML = `
            <div>
              <div class="device-title">
                <span class="dot"></span>
                <span class="device-name"></span>
              </div>
              <div class="device-sub"></div>
            </div>
            <div class="pill"></div>
          `;
          row.querySelector(".device-title").classList.toggle("online", device.availability === "online");
          row.querySelector(".device-name").textContent = deviceName(device);
          row.querySelector(".device-sub").textContent = [
            deviceType(device),
            device.id,
            temp !== undefined ? `${formatValue(temp)} C` : "",
            humidity !== undefined ? `${formatValue(humidity)}%` : "",
            battery !== undefined ? `${formatValue(battery)}% battery` : "",
          ]
            .filter(Boolean)
            .join(" · ");
          const pill = row.querySelector(".pill");
          pill.className = `pill ${device.availability === "online" ? "online" : "offline"}`;
          pill.textContent = device.availability;
          row.addEventListener("click", () => selectDevice(device.id));
          els.devices.append(row);
        }
        renderOverview();
      }

      function renderSelectedDevice() {
        const device = devices.get(selectedId);
        if (!device) {
          els.emptyDetail.hidden = false;
          els.deviceDetail.hidden = true;
          return;
        }

        const state = latestState(device);
        els.emptyDetail.hidden = true;
        els.deviceDetail.hidden = false;
        els.identity.textContent = "";
        els.identity.append(
          fact("Name", deviceName(device)),
          fact("Type", deviceType(device)),
          fact("Device ID", device.id),
          fact("Availability", device.availability),
          fact("Last Seen", timeLabel(device.lastSeen)),
          fact("Messages", device.messages),
        );

        els.stateFacts.textContent = "";
        const entries = Object.entries(state).filter(([key, value]) => {
          return value !== null && typeof value !== "object" && !["device_id", "observed_at"].includes(key);
        });
        if (device.state?.rssi_dbm !== undefined) entries.unshift(["rssi_dbm", device.state.rssi_dbm]);
        if (device.state?.observed_at) entries.unshift(["observed_at", device.state.observed_at]);
        if (entries.length === 0) {
          els.stateFacts.append(fact("State", "No state payload yet"));
        } else {
          for (const [key, value] of entries.slice(0, 12)) {
            els.stateFacts.append(fact(key, value));
          }
        }

        els.rawState.textContent = device.state ? JSON.stringify(device.state, null, 2) : "No state payload.";
        els.rawInfo.textContent = device.info ? JSON.stringify(device.info, null, 2) : "No info payload.";
        renderDevices();
      }

      function selectDevice(id) {
        selectedId = id;
        renderSelectedDevice();
      }

      function ingestInventory(inventory) {
        if (!inventory || !Array.isArray(inventory.devices)) return;
        for (const item of inventory.devices) {
          const id = item.device_id || item.deviceId;
          if (!id) continue;
          const device = deviceOf(id);
          device.info = {
            ...(device.info || {}),
            device_id: id,
            name: item.name,
            type: item.type,
          };
        }
      }

      function handleMessage(topic, payload) {
        messageCount += 1;
        if (paused) {
          renderOverview();
          return;
        }

        const parsed = parsePayload(payload);
        const parts = topic.split("/");

        if (parts[0] === "switchbot" && parts[1] === "gateway") {
          const kind = parts[2];
          if (kind === "status" && typeof parsed.value === "object") gateway.status = parsed.value.status;
          if (kind === "info") gateway.info = parsed.value;
          if (kind === "inventory") {
            gateway.inventory = parsed.value;
            ingestInventory(parsed.value);
          }
          gateway.updatedAt = new Date();
          renderGateway();
          renderDevices();
          return;
        }

        if (parts[0] !== "switchbot" || parts[1] !== "devices" || !parts[2]) {
          renderOverview();
          return;
        }

        const id = parts[2];
        const kind = parts[3];

        if (kind === "info") {
          if (!devices.has(id)) {
            renderOverview();
            return;
          }
          const device = deviceOf(id);
          device.messages += 1;
          device.info = parsed.value && typeof parsed.value === "object" ? parsed.value : { raw: parsed.value };
          device.infoUpdatedAt = new Date();
        } else if (kind === "availability") {
          if (!devices.has(id)) {
            renderOverview();
            return;
          }
          const device = deviceOf(id);
          device.messages += 1;
          device.availability = String(parsed.value);
          if (device.availability === "online") device.lastSeen = new Date();
        } else if (kind === "state") {
          const device = deviceOf(id);
          device.messages += 1;
          device.state = parsed.value && typeof parsed.value === "object" ? parsed.value : { value: parsed.value };
          device.stateUpdatedAt = new Date();
          device.lastSeen = new Date();
          device.availability = "online";
        } else {
          renderOverview();
          return;
        }

        if (!selectedId) selectedId = id;
        renderGateway();
        renderDevices();
        renderSelectedDevice();
      }

      function connect() {
        if (client) client.end(true);
        setConnectionStatus("connecting");
        client = mqtt.connect(els.url.value, {
          clientId: `switchbot-debug-${Math.random().toString(16).slice(2)}`,
          clean: true,
          reconnectPeriod: 2000,
        });
        client.on("connect", () => {
          setConnectionStatus(`connected · ${els.topic.value}`, true);
          client.subscribe(els.topic.value);
        });
        client.on("reconnect", () => setConnectionStatus("reconnecting"));
        client.on("close", () => setConnectionStatus("disconnected"));
        client.on("error", (error) => setConnectionStatus(`error: ${error.message}`));
        client.on("message", handleMessage);
      }

      document.getElementById("connect").addEventListener("click", connect);
      els.pause.addEventListener("click", () => {
        paused = !paused;
        els.pause.classList.toggle("active", paused);
        els.pause.textContent = paused ? "Resume" : "Pause";
      });
      els.filter.addEventListener("input", renderDevices);
      document.getElementById("publish").addEventListener("click", () => {
        if (!client || !client.connected) return;
        client.publish(els.publishTopic.value, els.publishPayload.value);
      });

      setInterval(() => {
        const delta = messageCount - lastRateCount;
        lastRateCount = messageCount;
        els.rate.textContent = `${delta}/s`;
      }, 1000);

      renderGateway();
      connect();
    </script>
  </body>
</html>
